<svg viewBox="0 0 760 289.5" xmlns="http://www.w3.org/2000/svg" width="760" height="289.5">
  <defs>
    

    <!-- Flag pattern spanning full logo area, diagonal split consistent across both words -->
    <pattern id="flag" patternUnits="userSpaceOnUse" x="0" y="0" width="760" height="260">
      <!-- Blue top half -->
      <rect x="0" y="0" width="760" height="130" fill="#0038A8"/>
      <!-- Red bottom half -->
      <rect x="0" y="130" width="760" height="130" fill="#CE1126"/>
      <!-- White triangle -->
      <polygon points="0,0 220,130 0,260" fill="white"/>
      <!-- Sun -->
      <g transform="translate(78,130)">
        <circle r="22" fill="#FCD116"/>
        <g stroke="#FCD116" stroke-width="4.5" stroke-linecap="round">
          <line x1="0" y1="-30" x2="0" y2="-40"/>
          <line x1="28.3" y1="-28.3" x2="35.4" y2="-35.4"/>
          <line x1="30" y1="0" x2="40" y2="0"/>
          <line x1="28.3" y1="28.3" x2="35.4" y2="35.4"/>
          <line x1="0" y1="30" x2="0" y2="40"/>
          <line x1="-28.3" y1="28.3" x2="-35.4" y2="35.4"/>
          <line x1="-30" y1="0" x2="-40" y2="0"/>
          <line x1="-28.3" y1="-28.3" x2="-35.4" y2="-35.4"/>
        </g>
        <circle r="11" fill="#FCD116"/>
      </g>
      <!-- 3 corner stars -->
      <polygon transform="translate(26,26)" points="0,-10 2.2,-3 8,-3 3.4,1.2 5.2,8 0,4.5 -5.2,8 -3.4,1.2 -8,-3 -2.2,-3" fill="#FCD116"/>
      <polygon transform="translate(26,234)" points="0,-10 2.2,-3 8,-3 3.4,1.2 5.2,8 0,4.5 -5.2,8 -3.4,1.2 -8,-3 -2.2,-3" fill="#FCD116"/>
      <polygon transform="translate(170,130)" points="0,-10 2.2,-3 8,-3 3.4,1.2 5.2,8 0,4.5 -5.2,8 -3.4,1.2 -8,-3 -2.2,-3" fill="#FCD116"/>
    </pattern>

    <!-- Single mask for both words stacked -->
    <mask id="text-mask">
      <rect width="760" height="260" fill="black"/>
      <text x="380" y="118" text-anchor="middle" font-family="Cinzel, 'Palatino Linotype', serif" font-size="115" font-weight="900" letter-spacing="4" fill="white">FILIPINO</text>
      <text x="380" y="245" text-anchor="middle" font-family="Cinzel, 'Palatino Linotype', serif" font-size="115" font-weight="900" letter-spacing="4" fill="white">MAHJONG</text>
    </mask>

    <!-- Gold gradient — only for outer stroke -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe57a"/>
      <stop offset="40%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a07828"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="sh" x="-6%" y="-6%" width="114%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="rgba(0,0,0,0.8)"/>
    </filter>
  </defs>

  <!-- Flag fill clipped to letter shapes -->
  <g filter="url(#sh)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect width="760" height="260" fill="url(#flag)" mask="url(#text-mask)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Gold outline ONLY on outside — paint-order stroke first so fill covers inner stroke -->
  <text x="380" y="118" text-anchor="middle" font-family="Cinzel, 'Palatino Linotype', serif" font-size="115" font-weight="900" letter-spacing="4" fill="url(#flag)" stroke="url(#gold)" stroke-width="6" stroke-linejoin="round" paint-order="stroke fill" style="color:rgb(0, 0, 0);stroke-width:6px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:Cinzel, &quot;Palatino Linotype&quot;, serif;font-size:115px;font-weight:900;text-anchor:middle;dominant-baseline:auto">FILIPINO</text>

  <text x="380" y="245" text-anchor="middle" font-family="Cinzel, 'Palatino Linotype', serif" font-size="115" font-weight="900" letter-spacing="4" fill="url(#flag)" stroke="url(#gold)" stroke-width="6" stroke-linejoin="round" paint-order="stroke fill" style="color:rgb(0, 0, 0);stroke-width:6px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:Cinzel, &quot;Palatino Linotype&quot;, serif;font-size:115px;font-weight:900;text-anchor:middle;dominant-baseline:auto">MAHJONG</text>

</svg>